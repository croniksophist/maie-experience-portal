<!DOCTYPE html>
<html lang="en">
<head>
<script src="assets/theme-init.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAIE — Page Not Found</title>
<meta name="description" content="The page you're looking for doesn't exist on the MAIE experience portal.">
<meta name="robots" content="noindex">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" href="assets/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="icon" href="assets/favicon-16x16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/maie-tokens.css">
<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font-ui);
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }
  .nf-wrap { max-width: 480px; }
  .nf-code {
    font-family: var(--font-display);
    font-size: clamp(64px, 18vw, 120px);
    line-height: 1;
    color: var(--primary);
    margin: 0 0 .5rem;
  }
  .nf-title { font-size: 20px; font-weight: 600; margin: 0 0 .75rem; }
  .nf-body { font-size: 15px; color: var(--text-2); line-height: 1.5; margin: 0 0 1.75rem; }
  .nf-link {
    display: inline-block;
    padding: .7rem 1.4rem;
    border-radius: var(--radius);
    background: var(--primary);
    color: #fff;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    transition: background .15s var(--ease);
  }
  .nf-link:hover { background: var(--primary-light); }
</style>
</head>
<body>
<div class="nf-wrap">
  <p class="nf-code">404</p>
  <h1 class="nf-title">This page doesn't exist</h1>
  <p class="nf-body">The link you followed may be broken, or the page may have moved. Head back to the MAIE experience portal to find your way.</p>
  <a class="nf-link" href="/maie-experience-portal/">Back to the portal</a>
</div>
</body>
</html>
